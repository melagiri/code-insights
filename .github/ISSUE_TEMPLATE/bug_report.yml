name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the fields below so we can reproduce and fix it quickly.

  - type: input
    id: version
    attributes:
      label: Code Insights version
      description: Run `code-insights --version` to find out
      placeholder: "e.g. 1.2.0"
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: Source tool (provider)
      description: Which AI coding tool are you syncing sessions from?
      options:
        - Claude Code
        - Cursor
        - Codex CLI
        - Copilot CLI
        - VS Code Copilot Chat
        - Not applicable / unsure
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Run `node --version`
      placeholder: "e.g. v22.4.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `code-insights sync`
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste any error messages or terminal output here
      render: shell
